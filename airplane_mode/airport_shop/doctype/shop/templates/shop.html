<h2 style="margin-bottom: 15px;">Shop Details</h2>

<div style="border: 1px solid #ddd; border-radius: 8px; padding: 15px; max-width: 500px;">

    <p style="font-size: 18px; font-weight: bold; color: #2c3e50;">
        {{ doc.shop_name}}
    </p>

    <p>
        <b>Shop Number:</b> {{ doc.shop_number }} <br>
        <b>Airport:</b> {{ doc.airport }}
    </p>

    <p><b>Shop Type:</b> {{ doc.shop_type }}</p>
    <p><b>Status:</b> {{ doc.status }}</p>

     {% if doc.status == "Available" %}

    <div style="margin-top: 15px;">
        <a href="/shop-webform/?shop={{ doc.name }}"
           style="
               display: inline-block;
               background-color: black;
               color: white;
               padding: 10px 18px;
               text-decoration: none;
               border-radius: 5px;
               font-weight: bold;
           ">
            Book
        </a>
    </div>
      {% else %}
    <p>This shop is already occupied.</p>
{% endif %}


</div>
